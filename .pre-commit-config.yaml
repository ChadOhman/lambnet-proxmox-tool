repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.0
    hooks:
      - id: ruff
        args: [--fix]

  - repo: local
    hooks:
      - id: pytest
        name: pytest
        entry: pytest
        args: [tests/, -x, -q]
        language: system
        pass_filenames: false
        always_run: true
        env:
          FLASK_SECRET_KEY: dev-pre-commit-secret
          DATABASE_URL: "sqlite:////tmp/pre-commit-test.db"
          LAMBNET_DATA_DIR: /tmp/lambnet-pre-commit
