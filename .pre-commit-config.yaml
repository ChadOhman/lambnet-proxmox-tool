repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.1
    hooks:
      - id: ruff
        args: [--fix]

  - repo: local
    hooks:
      - id: pytest
        name: pytest (smoke)
        entry: pytest
        args: [tests/test_models.py, tests/test_config.py, tests/test_auth.py, tests/test_security.py, -x, -q, --no-header]
        language: system
        pass_filenames: false
        always_run: true
        env:
          FLASK_SECRET_KEY: dev-pre-commit-secret
          DATABASE_URL: "sqlite:////tmp/pre-commit-test.db"
          MSTDNCA_DATA_DIR: /tmp/mstdnca-pre-commit
