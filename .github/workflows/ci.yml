name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  import-check:
    name: Import Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt gevent

      - name: Verify app factory loads
        env:
          FLASK_SECRET_KEY: ci-test-secret
          DATABASE_URL: "sqlite:////tmp/ci-test.db"
          MSTDNCA_DATA_DIR: /tmp/mstdnca-ci
        run: python -c "from app import create_app; create_app()"

  ruff:
    name: Ruff Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/ruff-action@v3

  pytest:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Run tests with coverage
        env:
          FLASK_SECRET_KEY: ci-test-secret
          DATABASE_URL: "sqlite:////tmp/ci-test.db"
          MSTDNCA_DATA_DIR: /tmp/mstdnca-ci
          MSTDNCA_SECRET_KEY: /tmp/mstdnca-ci/secret.key
        run: pytest tests/ -v --cov=. --cov-report=term-missing --cov-fail-under=40

  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          severity: warning
          scandir: scripts

  html-validate:
    name: Template Accessibility
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Run html-validate on templates
        # Jinja2 template syntax ({{ }}) causes 251 parser false positives.
        # Keep non-blocking until templates are pre-rendered for validation.
        continue-on-error: true
        env:
          GITHUB_ACTIONS: ""
        run: >
          npx --yes html-validate@9
          --config .htmlvalidate.json
          "templates/**/*.html"
