name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  compile-check:
    name: Syntax Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Compile all Python files
        run: python -m compileall -q .

  import-check:
    name: Import Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt gevent

      - name: Verify app factory loads
        env:
          FLASK_SECRET_KEY: ci-test-secret
          DATABASE_URL: "sqlite:////tmp/ci-test.db"
          LAMBNET_DATA_DIR: /tmp/lambnet-ci
        run: python -c "from app import create_app; create_app()"

  ruff:
    name: Ruff Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff
        run: ruff check .

  pytest:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Run tests with coverage
        env:
          FLASK_SECRET_KEY: ci-test-secret
          DATABASE_URL: "sqlite:////tmp/ci-test.db"
          LAMBNET_DATA_DIR: /tmp/lambnet-ci
        run: pytest tests/ -v --cov=. --cov-report=term-missing --cov-fail-under=18

  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          severity: warning
          scandir: .

  html-validate:
    name: Template Accessibility
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run html-validate on templates
        # continue-on-error until Jinja2 syntax exclusions are fully tuned
        continue-on-error: true
        run: >
          npx --yes html-validate@9
          --config .htmlvalidate.json
          "templates/**/*.html"
