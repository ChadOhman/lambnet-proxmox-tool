{% extends "base.html" %}
{% block title %}Change Password - Mastodon Canada Administration Tool{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-4">
        <h2 class="mb-4"><i class="bi bi-shield-lock"></i> Change Password</h2>
        <div class="card bg-dark">
            <div class="card-body">
                <form method="post">
                    <div class="mb-3">
                        <label class="form-label" for="current-password">Current Password</label>
                        <input type="password" class="form-control" name="current_password" id="current-password" required autocomplete="current-password">
                    </div>
                    <div class="mb-3">
                        <label class="form-label" for="new-password">New Password</label>
                        <input type="password" class="form-control" name="new_password" id="new-password" required minlength="8" autocomplete="new-password" aria-describedby="new-password-hint">
                        <div class="form-text" id="new-password-hint">Minimum 8 characters.</div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label" for="confirm-password">Confirm New Password</label>
                        <input type="password" class="form-control" name="confirm_password" id="confirm-password" required minlength="8" autocomplete="new-password">
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Change Password</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
