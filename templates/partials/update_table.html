<div class="table-responsive">
    <table class="table table-dark table-hover table-sm mb-0" aria-label="Available package updates">
        <thead>
            <tr>
                <th scope="col">Package</th>
                <th scope="col">Current</th>
                <th scope="col">Available</th>
                <th scope="col">Severity</th>
                <th scope="col"><span class="visually-hidden">Flags</span></th>
            </tr>
        </thead>
        <tbody>
            {% for pkg in packages %}
            <tr>
                <td>{{ pkg.package_name }}</td>
                <td><code>{{ pkg.current_version }}</code></td>
                <td><code>{{ pkg.available_version }}</code></td>
                <td><span class="badge badge-{{ pkg.severity }}">{{ pkg.severity }}</span></td>
                <td>
                    {% if pkg.requires_reboot %}
                    <span class="badge bg-warning text-dark" title="This package typically requires a reboot"><i class="bi bi-arrow-clockwise"></i> reboot</span>
                    {% endif %}
                </td>
            </tr>
            {% else %}
            <tr>
                <td colspan="5" class="text-center text-muted">No updates</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
